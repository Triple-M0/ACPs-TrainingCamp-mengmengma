
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝牙信标定位系统 - 鲲鹏大赛</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --secondary: #2ecc71;
            --secondary-dark: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --gray: #95a5a6;
            --card-shadow: 0 10px 20px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-attachment: fixed;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            animation: fadeIn 1s ease;
            transition: var(--transition);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 2px solid rgba(52, 152, 219, 0.2);
            position: relative;
            overflow: hidden;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            animation: titleGlow 2s infinite alternate;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--dark);
            opacity: 0.8;
        }

        .status-panel {
            margin: 25px 0;
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 12px;
            border-left: 6px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.8s ease;
            transition: var(--transition);
        }

        .status-panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .status-panel strong {
            font-size: 1.1rem;
            color: var(--dark);
        }

        .status-item {
            display: flex;
            align-items: center;
            margin: 0 15px;
        }

        .status-icon {
            margin-right: 8px;
            font-size: 1.2rem;
        }

        #status {
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            background: var(--light);
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }

        .controls {
            margin: 25px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .toggle-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: var(--light);
            color: var(--dark);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .scanner-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .scanner-card {
            padding: 25px;
            background: white;
            border-radius: 12px;
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border-top: 4px solid var(--primary);
        }

        .scanner-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease;
        }

        .scanner-card:hover::before {
            transform: scaleX(1);
        }

        .scanner-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .scanner-card h4 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--dark);
        }

        .scanner-card .scanner-position {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: var(--primary);
            font-weight: 600;
        }

        .scanner-status {
            font-size: 1rem;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            transition: var(--transition);
        }

        .scanner-online {
            background: rgba(46, 204, 113, 0.2);
            color: var(--secondary-dark);
        }

        .scanner-offline {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
        }

        .chart-container {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            margin: 25px 0;
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .chart-container:hover {
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .legend {
            text-align: center;
            margin-top: 25px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        .legend:hover {
            transform: translateY(-5px);
        }

        .legend-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--dark);
            font-size: 1.1rem;
        }

        .legend-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            padding: 8px 15px;
            background: var(--light);
            border-radius: 20px;
            transition: var(--transition);
        }

        .legend-item:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .color-dot {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        .fade-in {
            animation: fadeIn 0.8s ease;
        }

        .slide-up {
            animation: slideUp 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px rgba(52, 152, 219, 0.5); }
            to { text-shadow: 0 0 20px rgba(52, 152, 219, 0.8), 0 0 30px rgba(52, 152, 219, 0.6); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes beaconPulse {
            0% { r: 5; opacity: 1; }
            100% { r: 15; opacity: 0; }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .status-panel {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .controls {
                flex-direction: column;
                align-items: center;
            }

            .toggle-btn {
                width: 100%;
                justify-content: center;
            }

            .scanner-info {
                grid-template-columns: 1fr;
            }

            .chart-container {
                height: 400px;
            }
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(52, 152, 219, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-bluetooth-b"></i> 蓝牙信标实时定位系统</h1>
            <p>基于鲲鹏生态 + openEuler + openGauss | 北邮鲲鹏创新大赛项目</p>
        </div>

        <div class="status-panel">
            <div class="status-item">
                <span class="status-icon"><i class="fas fa-server"></i></span>
                <strong>系统状态:</strong>
                <span id="status">正在连接...</span>
            </div>
            <div class="status-item">
                <span class="status-icon"><i class="fas fa-clock"></i></span>
                <span id="lastUpdate">最后更新: --:--:--</span>
            </div>
            <div class="status-item">
                <span class="status-icon"><i class="fas fa-broadcast-tower"></i></span>
                <span id="beaconCount">活跃信标: 0 个</span>
            </div>
        </div>

        <div class="controls">
            <button id="showLatest" class="toggle-btn active">
                <i class="fas fa-map-marker-alt"></i> 仅显示最新位置
            </button>
            <button id="showHistory" class="toggle-btn">
                <i class="fas fa-road"></i> 显示历史轨迹
            </button>
        </div>

        <div class="scanner-info">
            <div class="scanner-card slide-up" style="animation-delay: 0.1s">
                <h4><i class="fas fa-satellite-dish"></i> 扫描器1</h4>
                <div class="scanner-position">位置: (1, 1)</div>
                <div id="scanner1_status" class="scanner-status scanner-offline">
                    <i class="fas fa-circle"></i> 状态: 离线
                </div>
            </div>
            <div class="scanner-card slide-up" style="animation-delay: 0.2s">
                <h4><i class="fas fa-satellite-dish"></i> 扫描器2</h4>
                <div class="scanner-position">位置: (3, 1)</div>
                <div id="scanner2_status" class="scanner-status scanner-offline">
                    <i class="fas fa-circle"></i> 状态: 离线
                </div>
            </div>
            <div class="scanner-card slide-up" style="animation-delay: 0.3s">
                <h4><i class="fas fa-satellite-dish"></i> 扫描器3</h4>
                <div class="scanner-position">位置: (2, 3)</div>
                <div id="scanner3_status" class="scanner-status scanner-offline">
                    <i class="fas fa-circle"></i> 状态: 离线
                </div>
            </div>
        </div>

        <div id="chart" class="chart-container">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>

        <div id="legend" class="legend">
            <div class="legend-title">信标图例</div>
            <div class="legend-items" id="legendItems">
                <!-- 图例将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>

    <script>
        // 初始化ECharts
        const chart = echarts.init(document.getElementById('chart'));

        // 移除加载动画
        setTimeout(() => {
            document.querySelector('.loading').style.display = 'none';
        }, 1000);

        // 目标MAC地址 - 只显示这个信标
        const TARGET_MAC = '52:0A:25:08:00:C1';

        // 信标颜色映射 - 为每个MAC地址分配固定颜色
        const beaconColors = {};
        const colorPalette = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7',
            '#DDA0DD', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9',
            '#F8C471', '#82E0AA', '#F1948A', '#85C1E9', '#D7BDE2'
        ];

        // 获取信标颜色
        function getBeaconColor(mac) {
            if (!mac) {
                console.warn('getBeaconColor called with undefined mac');
                return '#CCCCCC';
            }

            if (!beaconColors[mac]) {
                const colorIndex = Object.keys(beaconColors).length % colorPalette.length;
                beaconColors[mac] = colorPalette[colorIndex];
            }
            return beaconColors[mac];
        }

        // 更新图例
        function updateLegend(latestPositions) {
            const legendItems = document.getElementById('legendItems');
            if (!legendItems) {
                console.error('Legend items container not found');
                return;
            }

            let legendHTML = '';

            if (latestPositions && latestPositions.length > 0) {
                latestPositions.forEach(pos => {
                    if (pos && pos.mac && typeof pos.mac === 'string') {
                        const color = getBeaconColor(pos.mac);
                        const shortMac = pos.mac.substring(pos.mac.length - 4);
                        legendHTML += `
                        <div class="legend-item fade-in">
                            <span class="color-dot" style="background: ${color};"></span>
                            ${shortMac}
                        </div>`;
                    } else {
                        console.warn('Invalid position data:', pos);
                    }
                });
            } else {
                legendHTML = '<div class="legend-item">暂无信标数据</div>';
            }

            legendItems.innerHTML = legendHTML;
        }

        // 更新扫描器状态
        function updateScannerStatus() {
            const scanner1 = document.getElementById('scanner1_status');
            const scanner2 = document.getElementById('scanner2_status');
            const scanner3 = document.getElementById('scanner3_status');

            if (scanner1) {
                scanner1.className = 'scanner-status scanner-online pulse';
                scanner1.innerHTML = '<i class="fas fa-circle"></i> 状态: 在线';
            }
            if (scanner2) {
                scanner2.className = 'scanner-status scanner-online pulse';
                scanner2.innerHTML = '<i class="fas fa-circle"></i> 状态: 在线';
            }
            if (scanner3) {
                scanner3.className = 'scanner-status scanner-online pulse';
                scanner3.innerHTML = '<i class="fas fa-circle"></i> 状态: 在线';
            }
        }

        // 初始图表配置
        const option = {
            title: {
                text: '信标位置实时监控 (仅显示 52:0A:25:08:00:C1)',
                left: 'center',
                textStyle: {
                    fontSize: 18,
                    color: '#2c3e50'
                }
            },
            tooltip: {
                formatter: function(params) {
                    if (!params || !params.data) {
                        return '无数据';
                    }

                    if (params.seriesName === '扫描器') {
                        return `扫描器: ${params.data.name}<br/>位置: (${params.value[0]}, ${params.value[1]})`;
                    } else if (params.seriesName === '最新位置') {
                        return `信标: ${params.data.name}<br/>位置: (${params.value[0].toFixed(2)}, ${params.value[1].toFixed(2)})<br/>时间: ${params.data.timestamp || '最新'}`;
                    } else {
                        return `信标: ${params.data.name}<br/>历史位置: (${params.value[0].toFixed(2)}, ${params.value[1].toFixed(2)})<br/>时间: ${params.data.timestamp || '历史'}`;
                    }
                }
            },
            legend: {
                show: true,
                data: ['扫描器', '最新位置', '历史位置'],
                top: 30,
                textStyle: {
                    fontSize: 12
                }
            },
            xAxis: {
                type: 'value',
                name: 'X坐标 (米)',
                min: 0,
                max: 4,
                interval: 1,
                axisLine: {
                    lineStyle: {
                        color: '#7f8c8d'
                    }
                }
            },
            yAxis: {
                type: 'value',
                name: 'Y坐标 (米)',
                min: 0,
                max: 4,
                interval: 1,
                axisLine: {
                    lineStyle: {
                        color: '#7f8c8d'
                    }
                }
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '3%',
                containLabel: true,
                backgroundColor: '#f8f9fa'
            },
            animation: true,
            animationDuration: 1000,
            animationEasing: 'cubicOut',
            series: [
                {
                    name: '扫描器',
                    type: 'scatter',
                    data: [
                        {name: '扫描器1', value: [1, 1]},
                        {name: '扫描器2', value: [3, 1]},
                        {name: '扫描器3', value: [2, 3]}
                    ],
                    symbolSize: 25,
                    itemStyle: {
                        color: '#3498db',
                        shadowBlur: 10,
                        shadowColor: 'rgba(52, 152, 219, 0.5)'
                    },
                    label: {
                        show: true,
                        formatter: '{b}',
                        position: 'top',
                        fontWeight: 'bold',
                        color: '#2c3e50'
                    }
                },
                {
                    name: '最新位置',
                    type: 'scatter',
                    data: [],
                    symbolSize: 30,
                    itemStyle: {
                        color: function(params) {
                            if (!params || !params.data) {
                                return '#CCCCCC';
                            }
                            return getBeaconColor(params.data.name);
                        },
                        shadowBlur: 15,
                        shadowColor: function(params) {
                            if (!params || !params.data) {
                                return 'rgba(204, 204, 204, 0.5)';
                            }
                            return getBeaconColor(params.data.name) + '80';
                        }
                    },
                    label: {
                        show: true,
                        formatter: function(param) {
                            if (!param || !param.data) {
                                return '未知';
                            }
                            return param.data.name ? param.data.name.substring(param.data.name.length - 4) : '未知';
                        },
                        fontWeight: 'bold',
                        position: 'top',
                        color: '#2c3e50'
                    }
                },
                {
                    name: '历史位置',
                    type: 'scatter',
                    data: [],
                    symbolSize: 10,
                    itemStyle: {
                        color: function(params) {
                            if (!params || !params.data) {
                                return '#CCCCCC80';
                            }
                            const baseColor = getBeaconColor(params.data.name);
                            return baseColor + '80';
                        }
                    },
                    label: {
                        show: false
                    }
                }
            ]
        };

        chart.setOption(option);

        let showHistory = false;

        // 切换显示模式
        document.getElementById('showLatest').addEventListener('click', function() {
            showHistory = false;
            this.classList.add('active');
            document.getElementById('showHistory').classList.remove('active');
            updatePositions();

            // 添加点击动画
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = '';
            }, 200);
        });

        document.getElementById('showHistory').addEventListener('click', function() {
            showHistory = true;
            this.classList.add('active');
            document.getElementById('showLatest').classList.remove('active');
            updatePositions();

            // 添加点击动画
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = '';
            }, 200);
        });

        // 过滤位置数据，只保留目标MAC地址
        function filterPositions(positions) {
            if (!Array.isArray(positions)) return [];

            return positions.filter(pos => {
                return pos && pos.mac && typeof pos.mac === 'string' && pos.mac === TARGET_MAC;
            });
        }

        // 更新位置数据
        function updatePositions() {
            const apiUrl = showHistory ? '/api/history_positions' : '/api/positions';

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(positions => {
                    console.log('接收到位置数据:', positions);

                    if (!Array.isArray(positions)) {
                        throw new Error('返回的数据不是数组格式: ' + typeof positions);
                    }

                    // 过滤数据，只显示目标MAC地址的信标
                    const filteredPositions = filterPositions(positions);
                    console.log('过滤后的位置数据:', filteredPositions);

                    document.getElementById('status').innerHTML = '<span style="color: #27ae60;">运行正常</span>';
                    document.getElementById('lastUpdate').innerHTML = '最后更新: ' + new Date().toLocaleTimeString();

                    // 统计活跃信标数量（去重）
                    const validPositions = filteredPositions.filter(pos => pos && pos.mac && typeof pos.mac === 'string');
                    const uniqueBeacons = [...new Set(validPositions.map(p => p.mac))];
                    document.getElementById('beaconCount').innerHTML = '活跃信标: ' + uniqueBeacons.length + ' 个';

                    let latestData = [];
                    let historyData = [];

                    if (showHistory) {
                        // 显示历史轨迹模式
                        const latestMacs = new Set();

                        // 找出每个信标的最新位置（用于特殊标记）
                        validPositions.forEach(pos => {
                            if (!latestMacs.has(pos.mac)) {
                                latestMacs.add(pos.mac);
                                latestData.push({
                                    name: pos.mac,
                                    value: [pos.x, pos.y],
                                    timestamp: '最新'
                                });
                            } else {
                                historyData.push({
                                    name: pos.mac,
                                    value: [pos.x, pos.y],
                                    timestamp: new Date(pos.timestamp).toLocaleTimeString()
                                });
                            }
                        });
                    } else {
                        // 仅显示最新位置模式
                        latestData = validPositions.map(pos => ({
                            name: pos.mac,
                            value: [pos.x, pos.y],
                            timestamp: new Date(pos.timestamp).toLocaleTimeString()
                        }));
                    }

                    // 更新图表
                    try {
                        chart.setOption({
                            title: {
                                text: `信标位置实时监控 (仅显示 ${TARGET_MAC.substring(TARGET_MAC.length - 4)})`
                            },
                            series: [
                                {
                                    name: '扫描器',
                                    data: [
                                        {name: '扫描器1', value: [1, 1]},
                                        {name: '扫描器2', value: [3, 1]},
                                        {name: '扫描器3', value: [2, 3]}
                                    ]
                                },
                                {
                                    name: '最新位置',
                                    data: latestData
                                },
                                {
                                    name: '历史位置',
                                    data: historyData,
                                    symbolSize: showHistory ? 10 : 0
                                }
                            ]
                        });
                    } catch (chartError) {
                        console.error('图表更新错误:', chartError);
                    }

                    // 更新图例
                    updateLegend(latestData);

                    // 更新扫描器状态
                    updateScannerStatus();
                })
                .catch(error => {
                    console.error('获取数据失败详情:', error);
                    document.getElementById('status').innerHTML = '<span style="color: #e74c3c;">连接失败: ' + error.message + '</span>';
                });
        }

        // 每3秒更新一次
        setInterval(updatePositions, 3000);
        updatePositions(); // 立即执行一次

        // 窗口resize时调整图表
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
